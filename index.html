<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEM BINGO (አለም ቢንጎ)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
        }
        h1 { color: #00d2ff; }
        .called-box {
            border: 2px solid #00d2ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            background: #1f2937;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .cell {
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 5px;
            padding: 15px 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .cell.called { background-color: #10b981; color: white; }
        .cell.free { background-color: #f59e0b; color: white; }
        .btn-bingo {
            background: linear-gradient(90deg, #ff007f, #ffaa00);
            border: none;
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ALEM BINGO (አለም ቢንጎ)</h1>
        
        <div class="called-box">
            📢 አሁን የተጠራው ቁጥር: <h2 id="current-number" style="color:#ff007f; margin:5px;">--</h2>
            <small style="color:#10b981;">ያለፉ ቁጥሮች: </small><span id="past-numbers">የሉም</span>
        </div>

        <div id="cards-container"></div>

        <button class="btn-bingo" onclick="claimBingo()">🏆 ቢንጎ በል!</button>
    </div>

    <script>
        // የቴሌግራም ዌብ አፕን ማስጀመር
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ከፓይተን የተላከውን ዳታ በቀጥታ መቀበል
        const initData = tg.initDataUnsafe;
        
        let calledNumbers = [];
        let userCards = [];

        if (initData && initData.start_param) {
            try {
                // በ URL የመጣውን ዳታ መፍታት
                const decodedData = JSON.parse(atob(decodeURIComponent(initData.start_param)));
                calledNumbers = decodedData.called || [];
                userCards = decodedData.cards || [];
                
                // የተጠሩ ቁጥሮችን ማሳየት
                if (calledNumbers.length > 0) {
                    document.getElementById('current-number').innerText = calledNumbers[calledNumbers.length - 1];
                    document.getElementById('past-numbers').innerText = calledNumbers.join(', ');
                }
                
                // ካርቴላዎችን መገንባት
                const container = document.getElementById('cards-container');
                if (userCards.length === 0) {
                    container.innerHTML = "<p>የተቆረጠ ካርቴላ የለም። እባክዎ ከቦቱ ላይ Play 10 ን ይጫኑ!</p>";
                } else {
                    userCards.forEach(card => {
                        const cardDiv = document.createElement('div');
                        cardDiv.innerHTML = `<h3>ካርቴላ #${card.id}</h3>`;
                        
                        const gridDiv = document.createElement('div');
                        gridDiv.className = 'grid';
                        
                        card.matrix.forEach(row => {
                            row.forEach(val => {
                                const cell = document.createElement('div');
                                cell.className = 'cell';
                                cell.innerText = val;
                                
                                // FREE ወይም የተጠራ ቁጥር ከሆነ ቀለም መቀየር
                                if (val === "FREE") {
                                    cell.classList.add('free');
                                } else if (calledNumbers.includes(parseInt(val))) {
                                    cell.classList.add('called');
                                }
                                gridDiv.appendChild(cell);
                            });
                        });
                        cardDiv.appendChild(gridDiv);
                        container.appendChild(cardDiv);
                    });
                }
            } catch (e) {
                document.getElementById('cards-container').innerHTML = "<p style='color:red;'>የዳታ ስህተት ተከስቷል!</p>";
            }
        } else {
            document.getElementById('cards-container').innerHTML = "<p>የተቆረጠ ካርቴላ የለም። እባክዎ ከቦቱ ላይ Play 10 ን ይጫኑ!</p>";
        }

        function claimBingo() {
            tg.sendData("BINGO_CLAIM");
            tg.close();
        }
    </script>
</body>
</html>
